<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table Display</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <style>
        .p:hover { color: green; }
    </style>
</head>
<body style="background-color: currentColor;">
    <br>
    <div style="padding-left: 20px;">
        <a href="/" style="background-color:#4caf50; color:white; padding:8px 16px; text-decoration:none; border-radius:4px;">&#8592; Back to Home</a>
    </div>
    <br><br>
    <div style="height: 40px;">
        <h1><center style="color: peru;">Available Donars</center></h1>
    </div>
    <br><br><br>
    <table border="1" class="table table-striped table-bordered" style="color: aliceblue;">
        <thead>
            <tr>
                <th>Name</th>
                <th>CollegeName</th>
                <th>CollegeId</th>
                <th>CollegeArea</th>
                <th>Branch</th>
                <th>Age</th>
                <th>College Contact Number</th>
                <th>Blood Group</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
                <tr class="p">
                    <td>{{ row[5] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[6] }}</td>
                    <td>{{ row[7] }}</td>
                    <td>{{ row[-2] }}</td>
                    <td>{{ row[-1] }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
